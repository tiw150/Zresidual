url: https://tiw150.github.io/Zresidual/
template:
  bootstrap: 5
  bootswatch: flatly
  math-rendering: katex

articles:
  - title: "Getting Started"
    desc: "A quick introduction to the package."
    contents:
      - "get-started"                 # Matches vignettes/get-started.Rmd

  - title: "Illustration"
    desc: "Visual illustrations of Z-residuals."
    contents:
      - starts_with("articles/illus") # Matches vignettes/articles/illus_*.qmd

  - title: "Demonstration"
    desc: "Deep-dive demonstrations and model examples."
    contents:
      - starts_with("articles/demo") # Matches vignettes/articles/illus_*.qmd

navbar:
  title: "Z-residuals"
  left:
    - text: "Vignettes"
      href: articles/index.html
    - text: "Functions"
      href: reference/index.html
    - text: "News"
      href: news/index.html
  right:
    - icon: fa-github fa-lg
      href: https://github.com/tiw150/Zresidual
      aria-label: "GitHub repository"
    - icon: fas fa-newspaper
      aria-label: "Changelog"
      href: changelog.html
